<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>밤의 정원</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, sans-serif;
  background: #11161f;
  -webkit-font-smoothing: antialiased;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; padding: 2rem 1rem;
}
.garden-stage {
  position: relative; width: 100%; max-width: 600px;
  aspect-ratio: 3 / 4; border-radius: 28px; overflow: hidden;
  cursor: pointer; user-select: none; touch-action: none; background: #1a2438;
  -webkit-tap-highlight-color: transparent;
  box-shadow: 0 20px 60px rgba(0,0,0,0.45);
}
.garden-canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
.glass-top {
  position: absolute; top: 16px; left: 16px; right: 16px;
  display: flex; align-items: center; justify-content: space-between; z-index: 6;
}
.glass-pill {
  display: inline-flex; align-items: center; gap: 7px;
  height: 36px; padding: 0 16px; border-radius: 99px;
  background: rgba(255,255,255,0.14);
  backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%);
  border: 0.5px solid rgba(255,255,255,0.25);
  box-shadow: 0 1px 0 rgba(255,255,255,0.2) inset, 0 4px 16px rgba(0,0,0,0.18);
  font-size: 12px; font-weight: 500; letter-spacing: 0.02em; color: rgba(255,255,255,0.92);
}
.glass-pill .gd { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.55); transition: all 0.4s; }
.glass-pill.charging .gd { background: #ffcf70; box-shadow: 0 0 10px #ffcf70; animation: gpulse 0.8s infinite; }
.glass-pill.growing .gd { background: #ffe4ad; box-shadow: 0 0 10px #ffe4ad; animation: gpulse 1.3s infinite; }
@keyframes gpulse { 0%,100%{opacity:1} 50%{opacity:0.35} }
.top-actions { display: flex; gap: 8px; }
.glass-btn {
  display: inline-flex; align-items: center; justify-content: center;
  height: 36px; padding: 0 16px; border-radius: 99px;
  background: rgba(255,255,255,0.92);
  border: 0.5px solid rgba(255,255,255,0.7);
  box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset, 0 4px 16px rgba(0,0,0,0.25);
  font-family: inherit; font-size: 12px; font-weight: 500; letter-spacing: 0.02em;
  color: #1d2b40; cursor: pointer;
  transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
}
.glass-btn:hover { background: #ffffff; transform: translateY(-1.5px); box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset, 0 6px 20px rgba(0,0,0,0.3); }
.glass-btn:active { transform: translateY(0) scale(0.97); }
.glass-btn.muted {
  background: rgba(255,255,255,0.16); border-color: rgba(255,255,255,0.3); color: #fff;
  backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%);
  box-shadow: 0 1px 0 rgba(255,255,255,0.2) inset, 0 4px 16px rgba(0,0,0,0.18);
}
.glass-btn.muted:hover { background: rgba(255,255,255,0.26); }
.garden-bottom {
  position: absolute; left: 16px; right: 16px; bottom: 16px;
  z-index: 6; padding: 16px 18px; border-radius: 22px;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(24px) saturate(180%); -webkit-backdrop-filter: blur(24px) saturate(180%);
  border: 0.5px solid rgba(255,255,255,0.22);
  box-shadow: 0 1px 0 rgba(255,255,255,0.18) inset, 0 8px 32px rgba(0,0,0,0.22);
  display: flex; flex-direction: column; gap: 12px;
}
.seed-meter { height: 5px; border-radius: 99px; overflow: hidden; background: rgba(255,255,255,0.18); }
.seed-fill { height: 100%; width: 0%; border-radius: 99px; background: linear-gradient(90deg, #ff9a4d, #ffd9a0); box-shadow: 0 0 12px rgba(255,180,90,0.6); }
.garden-hint { font-size: 12.5px; font-weight: 400; color: rgba(255,255,255,0.78); text-align: center; min-height: 16px; }
.garden-title { font-size: 13px; font-weight: 500; letter-spacing: 0.04em; color: rgba(255,255,255,0.92); }
</style>
</head>
<body>

<div class="garden-stage" id="stage">
  <canvas class="garden-canvas" id="cv"></canvas>
  <div class="glass-top">
    <span class="glass-pill" id="state"><span class="gd"></span><span id="state-t">씨앗</span></span>
    <div class="top-actions">
      <button class="glass-btn" id="sound">소리 끄기</button>
      <button class="glass-btn" id="reset">비우기</button>
    </div>
  </div>
  <div class="garden-bottom">
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <span class="garden-title">밤의 정원</span>
      <span class="garden-title" id="count" style="opacity:0.6;">0 송이</span>
    </div>
    <div class="seed-meter"><div class="seed-fill" id="seed-fill"></div></div>
    <div class="garden-hint" id="hint">화면을 누르면 생명력이 차오르고, 떼면 꽃이 피어나요</div>
  </div>
</div>

<script>
const stage = document.getElementById('stage');
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const DPR = Math.min(window.devicePixelRatio || 1, 2);

let W = 0, H = 0;
function resize() {
  const rect = stage.getBoundingClientRect();
  W = rect.width; H = rect.height;
  cv.width = W * DPR; cv.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}

let charge = 0, charging = false, totalGrown = 0, richness = 0;
let flowers = [], particles = [], time = 0;
const MAX = 100, CHARGE_RATE = 1.1, SPEND_RATE = 0.45, ENERGY_PER_FLOWER = 18;
const PALETTE = [
  { core: '#fff6e8', glow: '#f5a623', petal: '#ffe2b8', edge: '#ff9a4d' },
  { core: '#fff0f4', glow: '#e88fae', petal: '#ffd4e0', edge: '#e57399' },
  { core: '#fff4dc', glow: '#ffb347', petal: '#ffe6bc', edge: '#ffa033' },
  { core: '#eef3ff', glow: '#9fbce8', petal: '#dde8f8', edge: '#84a8de' },
  { core: '#fdeeff', glow: '#c89be0', petal: '#f0ddf7', edge: '#b07fd0' },
];

let audioCtx = null, masterGain = null, soundOn = true;
let musicTimer = null, chordIndex = 0;
const CHORDS = [
  [261.63, 329.63, 392.00], [196.00, 246.94, 392.00], [220.00, 261.63, 329.63], [164.81, 246.94, 329.63],
  [174.61, 220.00, 261.63], [261.63, 329.63, 392.00], [174.61, 220.00, 261.63], [196.00, 246.94, 293.66],
];
const MELODY = [523.25, 493.88, 440.00, 392.00, 349.23, 392.00, 440.00, 493.88];

function ensureAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = soundOn ? 0.5 : 0;
    masterGain.connect(audioCtx.destination);
  }
  return audioCtx.state === 'suspended' ? audioCtx.resume() : Promise.resolve();
}
function playTone(freq, t, dur, vol, type) {
  const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
  osc.type = type || 'sine'; osc.frequency.value = freq;
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(vol, t + 0.08);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  osc.connect(g); g.connect(masterGain);
  osc.start(t); osc.stop(t + dur + 0.1);
}
function playChordStep() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  const chord = CHORDS[chordIndex % CHORDS.length];
  chord.forEach((f, i) => { playTone(f, now + i * 0.04, 2.4, 0.1, 'sine'); playTone(f * 2, now + i * 0.04, 1.6, 0.03, 'triangle'); });
  const mel = MELODY[chordIndex % MELODY.length];
  playTone(mel, now + 0.15, 1.4, 0.08, 'sine'); playTone(mel, now + 0.6, 1.0, 0.05, 'sine');
  chordIndex++;
}
function startMusic() {
  ensureAudio().then(() => {
    if (!soundOn) return;
    if (musicTimer) return;
    if (masterGain) masterGain.gain.value = 0.5;
    playChordStep();
    musicTimer = setInterval(playChordStep, 1800);
  });
}
function stopMusic() { if (musicTimer) { clearInterval(musicTimer); musicTimer = null; } }

function makeFlower(i) {
  const depth = 0.45 + Math.random() * 0.55;
  return { x: W * (0.16 + Math.random() * 0.68), y: H * (0.28 + Math.random() * 0.46),
    size: (15 + Math.random() * 20) * depth, depth, palette: PALETTE[i % PALETTE.length],
    petals: 5 + Math.floor(Math.random() * 4), innerPetals: Math.random() > 0.4,
    rot: Math.random() * Math.PI, bloom: 0, targetBloom: 1,
    swayPhase: Math.random() * Math.PI * 2, swaySpeed: 0.4 + Math.random() * 0.4, stemBend: (Math.random() - 0.5) * 0.5 };
}
function spawnPollen(x, y, color, n) {
  for (let i = 0; i < n; i++) particles.push({ x: x + (Math.random()-0.5) * 24, y: y + (Math.random()-0.5) * 24,
    vx: (Math.random()-0.5) * 0.4, vy: -0.2 - Math.random() * 0.5, life: 1, decay: 0.004 + Math.random() * 0.006, size: 1 + Math.random() * 2.5, color });
}
function hexA(hex, a) {
  const h = hex.replace('#',''); const r = parseInt(h.substring(0,2),16), g = parseInt(h.substring(2,4),16), b = parseInt(h.substring(4,6),16);
  return `rgba(${r},${g},${b},${Math.max(0,Math.min(1,a))})`;
}
function drawBackground() {
  const g = ctx.createLinearGradient(0, 0, W * 0.6, H);
  g.addColorStop(0, '#2a3a52'); g.addColorStop(0.45, '#34435c'); g.addColorStop(0.75, '#3a3548'); g.addColorStop(1, '#1e2436');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  if (richness > 0) {
    const gg = ctx.createRadialGradient(W*0.5, H*0.58, 0, W*0.5, H*0.58, W*0.75);
    gg.addColorStop(0, `rgba(245, 166, 35, ${0.18 * richness})`); gg.addColorStop(0.5, `rgba(232, 143, 110, ${0.09 * richness})`); gg.addColorStop(1, 'rgba(245, 166, 35, 0)');
    ctx.fillStyle = gg; ctx.fillRect(0, 0, W, H);
  }
}
function drawBokeh() {
  const spots = [
    { x: 0.2, y: 0.42, r: 70, c: '230,150,120' }, { x: 0.7, y: 0.7, r: 95, c: '245,180,90' },
    { x: 0.82, y: 0.32, r: 55, c: '150,180,210' }, { x: 0.35, y: 0.8, r: 80, c: '255,200,140' },
    { x: 0.6, y: 0.48, r: 45, c: '200,160,190' }, { x: 0.12, y: 0.62, r: 60, c: '210,170,200' },
  ];
  spots.forEach((b, i) => {
    const pulse = 0.5 + Math.sin(time * 0.0006 + i * 1.3) * 0.2; const intensity = (0.3 + richness * 0.5) * pulse;
    const bg = ctx.createRadialGradient(b.x*W, b.y*H, 0, b.x*W, b.y*H, b.r);
    bg.addColorStop(0, `rgba(${b.c}, ${0.22 * intensity})`); bg.addColorStop(0.6, `rgba(${b.c}, ${0.08 * intensity})`); bg.addColorStop(1, `rgba(${b.c}, 0)`);
    ctx.fillStyle = bg; ctx.beginPath(); ctx.arc(b.x*W, b.y*H, b.r, 0, Math.PI*2); ctx.fill();
  });
}
function petalPath(len, wid) {
  ctx.beginPath(); ctx.moveTo(0, 0);
  ctx.bezierCurveTo(wid*0.5, -len*0.3, wid*0.45, -len*0.75, 0, -len);
  ctx.bezierCurveTo(-wid*0.45, -len*0.75, -wid*0.5, -len*0.3, 0, 0); ctx.closePath();
}
function drawFlower(f) {
  if (f.bloom <= 0.01) return;
  const sway = Math.sin(time * 0.001 * f.swaySpeed + f.swayPhase) * 6 * f.depth;
  const cx = f.x + sway, cy = f.y, bloom = f.bloom, size = f.size * bloom;
  ctx.save();
  const stemBaseY = H + 20, ctrlX = cx + f.stemBend * 60 + sway * 1.5;
  ctx.beginPath(); ctx.moveTo(cx, cy); ctx.quadraticCurveTo(ctrlX, (cy + stemBaseY)/2, cx + f.stemBend * 20, stemBaseY);
  ctx.strokeStyle = `rgba(70, 95, 80, ${0.4 * bloom * f.depth})`; ctx.lineWidth = 2.2 * f.depth; ctx.stroke();
  const glowR = size * 2.6;
  const gg = ctx.createRadialGradient(cx, cy, 0, cx, cy, glowR);
  gg.addColorStop(0, hexA(f.palette.glow, 0.5 * bloom)); gg.addColorStop(0.4, hexA(f.palette.glow, 0.16 * bloom)); gg.addColorStop(1, hexA(f.palette.glow, 0));
  ctx.fillStyle = gg; ctx.beginPath(); ctx.arc(cx, cy, glowR, 0, Math.PI*2); ctx.fill();
  ctx.save(); ctx.translate(cx, cy);
  const outerLen = size * 1.05, outerWid = size * 0.7;
  for (let p = 0; p < f.petals; p++) {
    const angle = f.rot + (p / f.petals) * Math.PI * 2; const flutter = Math.sin(time*0.0015 + p * 1.7) * 0.04;
    ctx.save(); ctx.rotate(angle + flutter);
    const pg = ctx.createLinearGradient(0, 0, 0, -outerLen);
    pg.addColorStop(0, hexA(f.palette.edge, 0.5 * bloom)); pg.addColorStop(0.5, hexA(f.palette.petal, 0.9 * bloom)); pg.addColorStop(1, hexA(f.palette.petal, 0.35 * bloom));
    ctx.fillStyle = pg; petalPath(outerLen, outerWid); ctx.fill(); ctx.restore();
  }
  if (f.innerPetals && bloom > 0.5) {
    const innerLen = size * 0.62, innerWid = size * 0.42, innerBloom = (bloom - 0.5) / 0.5;
    for (let p = 0; p < f.petals; p++) {
      const angle = f.rot + ((p + 0.5) / f.petals) * Math.PI * 2;
      ctx.save(); ctx.rotate(angle);
      const pg = ctx.createLinearGradient(0, 0, 0, -innerLen);
      pg.addColorStop(0, hexA(f.palette.core, 0.7 * innerBloom)); pg.addColorStop(1, hexA(f.palette.petal, 0.2 * innerBloom));
      ctx.fillStyle = pg; petalPath(innerLen, innerWid); ctx.fill(); ctx.restore();
    }
  }
  const cg = ctx.createRadialGradient(0, 0, 0, 0, 0, size * 0.5);
  cg.addColorStop(0, hexA('#ffffff', 0.95 * bloom)); cg.addColorStop(0.5, hexA(f.palette.core, 0.85 * bloom)); cg.addColorStop(1, hexA(f.palette.glow, 0.15 * bloom));
  ctx.fillStyle = cg; ctx.beginPath(); ctx.arc(0, 0, size * 0.4, 0, Math.PI*2); ctx.fill();
  if (bloom > 0.6) {
    for (let s = 0; s < 6; s++) {
      const sa = (s / 6) * Math.PI * 2 + time * 0.0003, sr = size * 0.28;
      ctx.beginPath(); ctx.arc(Math.cos(sa)*sr, Math.sin(sa)*sr, size * 0.05, 0, Math.PI*2);
      ctx.fillStyle = hexA(f.palette.edge, 0.8 * bloom); ctx.fill();
    }
  }
  ctx.restore(); ctx.restore();
  if (bloom > 0.3 && bloom < 0.99 && Math.random() > 0.9) spawnPollen(cx, cy, f.palette.glow, 1);
}
function drawParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy -= 0.002; p.life -= p.decay;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fillStyle = hexA(p.color, p.life * 0.7); ctx.fill();
  }
}
function render() {
  time += 16;
  if (charging) { charge = Math.min(MAX, charge + CHARGE_RATE); updateMeter(); }
  else if (charge > 0) {
    const spend = Math.min(charge, SPEND_RATE); charge -= spend; totalGrown += spend; growFlowers(); updateMeter();
    if (charge <= 0) { charge = 0; setState('SEED'); stopMusic(); }
  }
  richness = Math.min(1, totalGrown / 80);
  ctx.clearRect(0, 0, W, H); drawBackground(); drawBokeh();
  flowers.forEach(f => {
    if (f.bloom < f.targetBloom) f.bloom = Math.min(f.targetBloom, f.bloom + 0.02);
    else if (f.bloom > f.targetBloom) f.bloom = Math.max(f.targetBloom, f.bloom - 0.03);
  });
  flowers = flowers.filter(f => !(f.targetBloom === 0 && f.bloom <= 0.01));
  flowers.forEach(drawFlower); drawParticles();
  requestAnimationFrame(render);
}
function growFlowers() {
  const needed = Math.floor(totalGrown / ENERGY_PER_FLOWER);
  const active = flowers.filter(f => f.targetBloom > 0).length;
  if (active < needed && flowers.length < 40) { const f = makeFlower(flowers.length); flowers.push(f); spawnPollen(f.x, f.y, f.palette.glow, 5); }
  updateCount();
}
function updateMeter() { document.getElementById('seed-fill').style.width = (charge / MAX * 100) + '%'; }
function updateCount() { const n = flowers.filter(f => f.targetBloom > 0).length; document.getElementById('count').textContent = n + ' 송이'; }
function setState(s) {
  const el = document.getElementById('state'), t = document.getElementById('state-t'), hint = document.getElementById('hint');
  el.className = 'glass-pill';
  if (s === 'SEED') { t.textContent = totalGrown > 0 ? '쉬는 중' : '씨앗'; hint.textContent = '다시 누르면 더 많은 꽃이 피어나요'; }
  else if (s === 'CHARGING') { el.classList.add('charging'); t.textContent = '충전 중'; hint.textContent = '누르는 만큼 생명력이 쌓여요'; }
  else if (s === 'GROWING') { el.classList.add('growing'); t.textContent = '개화 중'; hint.textContent = '생명력이 꽃으로 피어나는 중...'; }
}
function startCharge() { charging = true; setState('CHARGING'); }
function releaseCharge() {
  if (!charging) return; charging = false;
  if (charge > 0) { setState('GROWING'); if (soundOn) startMusic(); } else setState('SEED');
}
function resetGarden() {
  charging = false; charge = 0; totalGrown = 0; richness = 0;
  flowers.forEach(f => { f.targetBloom = 0; }); stopMusic();
  updateMeter(); setState('SEED');
  document.getElementById('state-t').textContent = '씨앗';
  document.getElementById('hint').textContent = '화면을 누르면 생명력이 차오르고, 떼면 꽃이 피어나요';
  document.getElementById('count').textContent = '0 송이';
}

function toggleSound() {
  soundOn = !soundOn;
  const btn = document.getElementById('sound');
  btn.textContent = soundOn ? '소리 끄기' : '소리 켜기';
  btn.classList.toggle('muted', !soundOn);
  if (soundOn) {
    ensureAudio().then(() => { if (masterGain) masterGain.gain.value = 0.5; });
    if (document.getElementById('state-t').textContent === '개화 중') startMusic();
  } else {
    if (masterGain) masterGain.gain.value = 0;
    stopMusic();
  }
}

stage.addEventListener('mousedown', (e) => { e.preventDefault(); ensureAudio(); startCharge(); });
stage.addEventListener('touchstart', (e) => { e.preventDefault(); ensureAudio(); startCharge(); }, { passive: false });
window.addEventListener('mouseup', releaseCharge);
window.addEventListener('touchend', releaseCharge);

const resetBtn = document.getElementById('reset');
resetBtn.addEventListener('mousedown', (e) => e.stopPropagation());
resetBtn.addEventListener('touchstart', (e) => e.stopPropagation(), { passive: false });
resetBtn.addEventListener('click', (e) => { e.stopPropagation(); resetGarden(); });

const soundBtn = document.getElementById('sound');
soundBtn.addEventListener('mousedown', (e) => e.stopPropagation());
soundBtn.addEventListener('touchstart', (e) => e.stopPropagation(), { passive: false });
soundBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleSound(); });

function init() { resize(); setState('SEED'); render(); }
window.addEventListener('resize', resize);
init();
</script>
</body>
</html>
